<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0A2E5A">
<title>KIB WFM — Schedule Editor</title>
<link rel="stylesheet" href="css/kib.css">
<style>
* { box-sizing: border-box; }
body { background: #F0F4FA; }
@keyframes spin { from{transform:rotate(0)} to{transform:rotate(360deg)} }

/* TOOLBAR */
.ed-bar {
  position: sticky;
  top: var(--topbar-h, 56px);
  z-index: 50;
  background: #fff;
  border-bottom: 1px solid #E0EAF8;
  box-shadow: 0 2px 10px rgba(10,46,90,.06);
}
.ed-bar-row1 {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  flex-wrap: wrap;
}
.ed-bar-row2 {
  display: flex;
  gap: 5px;
  padding: 0 12px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.ed-bar-row2::-webkit-scrollbar { display: none; }

.wk-arrow {
  width: 30px; height: 30px;
  border: 1.5px solid #D1DCF0;
  border-radius: 8px;
  background: #F8FAFF;
  font-size: 16px; font-weight: 800;
  color: #0A2E5A; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .1s;
}
.wk-arrow:hover { background: #E0EAF8; }
.wk-lbl {
  font-size: 12px; font-weight: 800; color: #0A2E5A;
  min-width: 120px; text-align: center; flex-shrink: 0;
}
.ed-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid #D1DCF0;
  background: #fff;
  font-size: 11px; font-weight: 700; color: #5A6E8A;
  cursor: pointer; white-space: nowrap;
  transition: .12s; flex-shrink: 0;
}
.ed-btn.primary { background: #0A2E5A; border-color: #0A2E5A; color: #fff; }
.ed-btn.teal    { background: #00A89A; border-color: #00A89A; color: #fff; }
.ed-btn.amber   { background: #FEF3C7; border-color: #F59E0B; color: #92400E; }
.ed-btn:hover   { filter: brightness(.93); }

.tc {
  padding: 4px 11px;
  border-radius: 20px;
  border: 1.5px solid #D1DCF0;
  background: #fff;
  font-size: 11px; font-weight: 700; color: #5A6E8A;
  cursor: pointer; white-space: nowrap;
  transition: .12s; flex-shrink: 0;
}
.tc.on { background: #0A2E5A; border-color: #0A2E5A; color: #fff; }

/* GRID */
.g-scroll {
  overflow: auto;
  margin: 10px 10px 90px;
  border-radius: 14px;
  border: 1.5px solid #D8E5F5;
  background: #fff;
  box-shadow: 0 4px 20px rgba(10,46,90,.07);
}
.g-tbl {
  border-collapse: separate;
  border-spacing: 0;
  width: max-content;
  min-width: 100%;
}
.g-tbl thead th {
  position: sticky; top: 0; z-index: 12;
  background: #0A2E5A;
  color: rgba(255,255,255,.6);
  padding: 6px 3px;
  font-size: 9px; font-weight: 700;
  text-align: center; white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,.07);
  min-width: 100px;
  line-height: 1.4;
}
.g-tbl thead th.th-name {
  position: sticky; left: 0; z-index: 22;
  text-align: left; padding: 6px 10px 6px 14px;
  min-width: 185px; width: 185px;
  border-right: 2px solid rgba(255,255,255,.1);
  background: #07213F;
}
.g-tbl thead th.th-today { background: #007A70; color: #fff; }
.g-tbl thead th.th-wknd  { background: #071A30; color: rgba(255,255,255,.3); }
.g-tbl td {
  border-right: 1px solid #EDF2FA;
  border-bottom: 1px solid #EDF2FA;
  height: 46px; padding: 0;
}
.g-tbl .td-name {
  position: sticky; left: 0; z-index: 5;
  background: #fff;
  border-right: 2px solid #E0EAF8;
  padding: 5px 10px;
  min-width: 185px; width: 185px;
}
.g-tbl tr:hover td { background: rgba(10,46,90,.018); }
.g-tbl tr:hover .td-name { background: #F4F8FF; }
.g-tbl td.td-today { background: rgba(0,122,112,.05); }
.g-tbl .td-name.td-today { background: rgba(0,122,112,.07) !important; }
.g-tbl td.td-wknd { background: #FAFBFD; }
.grp-row td {
  background: #E8F0FB !important;
  font-size: 10px; font-weight: 800; color: #1A3F70;
  text-transform: uppercase; letter-spacing: .7px;
  padding: 0 14px; height: 26px !important;
  border-bottom: 1px solid #D0DFF5;
  vertical-align: middle;
}

/* Agent */
.ag-av {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 900; color: #fff; flex-shrink: 0;
}
.ag-nm { font-size: 11.5px; font-weight: 700; color: #0D1F3C; line-height: 1.2; }
.ag-role {
  display: inline-block; font-size: 8px; font-weight: 700;
  color: #fff; padding: 1px 5px; border-radius: 3px; margin-top: 2px;
}

/* Cell */
.cell-wrap {
  display: flex; align-items: center; justify-content: center;
  height: 46px; padding: 3px 4px; position: relative;
}
.cell-chip {
  display: flex; align-items: center; justify-content: center;
  width: 92px; height: 36px;
  border-radius: 9px;
  font-size: 11px; font-weight: 800;
  cursor: pointer; position: relative;
  transition: transform .12s, filter .12s;
  border: 1.5px solid transparent;
  letter-spacing: .2px;
}
.cell-chip:hover { transform: scale(1.06); filter: brightness(.92); }
.cell-chip.edited { border-color: #F59E0B; box-shadow: 0 0 0 2px rgba(245,158,11,.2); }
.edited-dot {
  position: absolute; top: -3px; right: -3px;
  width: 7px; height: 7px;
  background: #F59E0B; border-radius: 50%; border: 1.5px solid #fff;
}
.cell-sel {
  position: absolute; opacity: 0; inset: 0; cursor: pointer;
  width: 100%; height: 100%; z-index: 2;
}

/* SAVE BAR */
.save-bar {
  position: fixed;
  bottom: calc(var(--nav-h, 64px) + env(safe-area-inset-bottom,0px) + 8px);
  left: 50%;
  transform: translateX(-50%) translateY(120px);
  background: linear-gradient(135deg, #0A2E5A 0%, #0D3A72 100%);
  color: #fff;
  padding: 12px 18px;
  border-radius: 16px;
  display: flex; align-items: center; gap: 10px;
  z-index: 300;
  box-shadow: 0 8px 32px rgba(10,46,90,.35);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap;
}
.save-bar.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div id="kib-topbar"></div>

<!-- TOOLBAR -->
<div class="ed-bar" style="margin-top:var(--topbar-h,56px);">
  <div class="ed-bar-row1">
    <button class="wk-arrow" onclick="prevWeek()">‹</button>
    <div class="wk-lbl" id="wk-lbl">Loading…</div>
    <button class="wk-arrow" onclick="nextWeek()">›</button>
    <button class="ed-btn primary" onclick="goToday()">Today</button>
    <button class="ed-btn" id="refresh-btn" onclick="refreshData()">
      <span id="refresh-icon" style="display:inline-block;">↺</span> Refresh
    </button>
    <div id="pending-badge" style="display:none;" class="ed-btn amber">● <span id="pending-count">0</span> unsaved</div>
    <div style="flex:1;"></div>
    <button id="save-top-btn" onclick="saveAll()" style="display:none;background:#00A89A;border:none;color:#fff;padding:6px 14px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;">✓ Save</button>
  </div>
  <div class="ed-bar-row2" id="tc-wrap"></div>
</div>

<!-- GRID -->
<div id="kib-app" style="padding-top:0;">
  <div class="g-scroll" id="g-scroll">
    <div id="g-container" style="padding:48px;text-align:center;color:#7A8FAA;">
      <div class="kib-spin" style="margin:0 auto 12px;"></div>
      <div style="font-size:13px;">Loading schedule…</div>
    </div>
  </div>
</div>

<div id="kib-bottomnav"></div>

<!-- SAVE BAR -->
<div class="save-bar" id="save-bar">
  <div style="flex:1;">
    <div style="font-size:14px;font-weight:800;" id="save-bar-count">0 changes</div>
    <div style="font-size:10px;opacity:.65;margin-top:1px;">Tap Save to update Google Sheets</div>
  </div>
  <button onclick="discardAll()" style="padding:8px 13px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;">✕ Discard</button>
  <button onclick="saveAll()" id="save-btn" style="padding:8px 16px;background:#00A89A;border:none;color:#fff;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;">✓ Save All</button>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script>
if (!Auth.guard()) throw 0;
const _acc = Auth.user()?.access||'';
if (!['management','wfm','admin'].includes(_acc)) {
  alert('Management access required.'); window.history.back(); throw 0;
}

const user    = Auth.user();
Nav.init('schedule-edit');

let allData=null, allAgents=[], allDates=[];
let weekAnchor=U.today(), teamFilter='All';
let pending={};

/* ── SHIFT OPTIONS ── */
function buildOptions(cur) {
  let h = '<option value="">— select —</option>';
  h += '<optgroup label="── Shifts ──">';
  (CFG.SHIFT_OPTIONS||[]).forEach(s=>{
    h += `<option value="${s}" ${s===cur?'selected':''}>${s}</option>`;
  });
  h += '</optgroup><optgroup label="── Off / Leave ──">';
  (CFG.DAY_TYPES||[]).forEach(t=>{
    h += `<option value="${t.code}" ${t.code===cur?'selected':''}>${t.code} — ${t.label}</option>`;
  });
  h += '</optgroup>';
  return h;
}

/* ── CELL COLORS ── */
function cellStyle(code) {
  if (!code||code==='OFF') return {bg:'#F1F5F9',c:'#64748B'};
  const dt=(CFG.DAY_TYPES||[]).find(d=>d.code===code);
  if (dt) return {bg:dt.bg, c:dt.color};
  if (CFG.getShiftDisplay) {
    const def = CFG.getShiftDisplay(code);
    if (def?.bg) return {bg:def.bg, c:def.color};
  }
  const h=parseInt(code)||0;
  if(h<9)  return {bg:'#DBEAFE',c:'#1D4ED8'};
  if(h<13) return {bg:'#D1FAE5',c:'#065F46'};
  if(h<17) return {bg:'#FEF3C7',c:'#92400E'};
  return {bg:'#EDE9FE',c:'#5B21B6'};
}

/* ── SHORT LABEL ── */
function shortLabel(code) {
  if (!code||code==='OFF') return 'OFF';
  const dt=(CFG.DAY_TYPES||[]).find(d=>d.code===code);
  if (dt) return dt.short||dt.code;
  const parts=code.split('-');
  if (parts.length>=2) {
    const s=parts[0].split(':')[0];
    const e=parts[1].split(':')[0];
    return `${parseInt(s)}–${parseInt(e)}`;
  }
  return code;
}

/* ── INIT ── */
async function init(force=false) {
  setLoading(true);
  try {
    allData   = await API.getAll(force);
    Nav.setSyncStatus(true);
    allAgents = (allData.agents||[]).filter(a=>a.t!=='Management');
    allDates  = (allData.dates||[]).map(d=>U.normDate(d));
    buildTeamChips();
    renderGrid();
  } catch(e) {
    Nav.setSyncStatus(false);
    document.getElementById('g-container').innerHTML=
      `<div style="color:#EF4444;padding:48px;text-align:center;">
        <div style="font-size:28px;margin-bottom:10px;">⚠️</div>
        <div style="font-weight:700;margin-bottom:14px;">Failed to load schedule</div>
        <button onclick="init(true)" style="padding:9px 20px;border-radius:9px;border:2px solid #EF4444;
          background:#fff;color:#EF4444;font-weight:800;font-size:13px;cursor:pointer;">↺ Retry</button>
      </div>`;
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('refresh-btn');
  const icon = document.getElementById('refresh-icon');
  if (!btn||!icon) return;
  btn.disabled = on;
  icon.style.animation = on ? 'spin .6s linear infinite' : '';
}

/* ── TEAM CHIPS ── */
function buildTeamChips() {
  const teams=['All',...(CFG.TEAMS||[]).filter(t=>allAgents.some(a=>a.t===t))];
  document.getElementById('tc-wrap').innerHTML=teams.map(t=>
    `<div class="tc ${t===teamFilter?'on':''}" onclick="setTeam('${t}',this)">${t}</div>`
  ).join('');
}
function setTeam(t,el) {
  teamFilter=t;
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');
  renderGrid();
}

/* ── REFRESH ── */
async function refreshData() {
  if (Object.keys(pending).length) {
    if (!confirm('Refresh will discard unsaved changes. Continue?')) return;
    pending={};
  }
  API.clearCache('getAll');
  API.clearCache('sched_');
  await init(true);
  U.toast('Schedule refreshed ✓','ok');
}

/* ── WEEK NAV ── */
function prevWeek() { weekAnchor=U.addDays(weekAnchor,-7); renderGrid(); }
function nextWeek() { weekAnchor=U.addDays(weekAnchor, 7); renderGrid(); }
function goToday()  { weekAnchor=U.today(); renderGrid(); }

function getWeekDates() {
  const w=U.getWeekDates(weekAnchor);
  if (!allDates.length) return w;
  return w.filter(d=>d>=allDates[0]&&d<=allDates[allDates.length-1]);
}

/* ── RENDER ── */
function renderGrid() {
  const wd=getWeekDates();
  if (!wd.length) {
    document.getElementById('g-container').innerHTML=
      `<div style="padding:48px;text-align:center;color:#94A3B8;font-size:13px;">
        No schedule data for this period.<br>
        <button onclick="refreshData()" style="margin-top:12px;padding:8px 16px;border-radius:9px;
          border:1.5px solid #0A2E5A;color:#0A2E5A;background:#fff;font-weight:700;cursor:pointer;">
          ↺ Refresh Data</button>
      </div>`;
    updateWkLbl(wd); return;
  }
  updateWkLbl(wd);

  const agents = teamFilter==='All' ? allAgents : allAgents.filter(a=>a.t===teamFilter);
  const today  = U.today();
  const teams  = [...new Set(agents.map(a=>a.t))];
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONS   = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Header
  let th=`<thead><tr>
    <th class="th-name" style="font-size:9px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.4px;">
      👤 ${agents.length} agents
    </th>`;
  wd.forEach(d=>{
    const dn=new Date(d+'T00:00:00');
    const isT=d===today, isW=U.isWeekend(d);
    th+=`<th class="${isT?'th-today':isW?'th-wknd':''}">
      <div style="font-size:8px;opacity:.65;">${DAYS[dn.getDay()]}</div>
      <div style="font-size:15px;font-weight:900;color:${isT?'#fff':'rgba(255,255,255,.92)'};">${dn.getDate()}</div>
      <div style="font-size:8px;opacity:.55;">${MONS[dn.getMonth()]}</div>
    </th>`;
  });
  th+=`</tr></thead>`;

  // Body
  let tb='<tbody>';
  teams.forEach(team=>{
    const members=agents.filter(a=>a.t===team);
    if (!members.length) return;
    const tc=CFG.TEAM_COLORS[team]||'#6B7280';
    // Count scheduled today
    const todayIdx=allDates.indexOf(today);
    const scheduled=members.filter(ag=>{
      const s=todayIdx>=0&&ag.sch?ag.sch[todayIdx]:'';
      return s&&s!=='OFF'&&!['AL','SL','PH','UL','Leave'].includes(s);
    }).length;
    tb+=`<tr class="grp-row"><td colspan="${wd.length+1}" style="color:${tc};">
      ${team}
      <span style="color:#6A8AAA;font-weight:600;text-transform:none;letter-spacing:0;font-size:9px;margin-left:8px;">
        ${members.length} agents · ${scheduled} working today
      </span>
    </td></tr>`;

    members.forEach(ag=>{
      const name=ag.n||ag.name;
      const ac=U.avatarColor(name);
      tb+=`<tr>
        <td class="td-name">
          <div style="display:flex;align-items:center;gap:7px;">
            <div class="ag-av" style="background:${ac};">${U.initials(name)}</div>
            <div>
              <div class="ag-nm">${name}</div>
              <span class="ag-role" style="background:${tc};">${ag.t||ag.role||team}</span>
            </div>
          </div>
        </td>`;

      wd.forEach(d=>{
        const di=allDates.indexOf(d);
        // DEBUG: log if date not found
        if (di<0 && allDates.length>0) console.warn('Date not in allDates:', d, 'allDates[0]:', allDates[0]);
        const raw=(di>=0&&ag.sch?ag.sch[di]:'')||'OFF';
        const pKey=`${name}|${d}`;
        const code=pending[pKey]?pending[pKey].shift:(CFG.normalizeShiftCode?CFG.normalizeShiftCode(raw):raw)||'OFF';
        const {bg,c}=cellStyle(code);
        const lbl=shortLabel(code);
        const edited=!!pending[pKey];
        const isT=d===today, isW=U.isWeekend(d);
        const ea=name.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        const eo=CFG.normalizeShiftCode?CFG.normalizeShiftCode(raw):raw;

        tb+=`<td class="${isT?'td-today':''} ${isW?'td-wknd':''}">
          <div class="cell-wrap">
            <div class="cell-chip ${edited?'edited':''}" style="background:${bg};color:${c};"
                 id="chip-${ea.replace(/\s+/g,'-').replace(/[^\w-]/g,'')}-${d}">
              ${lbl}${edited?'<span class="edited-dot"></span>':''}
            </div>
            <select class="cell-sel" data-agent="${ea}" data-date="${d}" data-orig="${eo}" onchange="onCellChange(this)">
              ${buildOptions(code)}
            </select>
          </div>
        </td>`;
      });
      tb+='</tr>';
    });
  });
  tb+='</tbody>';

  document.getElementById('g-container').innerHTML=`<table class="g-tbl">${th}${tb}</table>`;
}

function updateWkLbl(wd) {
  const MONS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if (!wd?.length) { document.getElementById('wk-lbl').textContent='No data'; return; }
  const f=new Date(wd[0]+'T00:00:00'), l=new Date(wd[wd.length-1]+'T00:00:00');
  document.getElementById('wk-lbl').textContent=`${f.getDate()} ${MONS[f.getMonth()]} – ${l.getDate()} ${MONS[l.getMonth()]}`;
}

/* ── CELL CHANGE ── */
function onCellChange(sel) {
  const {agent,date,orig}=sel.dataset;
  const code=sel.value;
  if (!code) return;
  const pKey=`${agent}|${date}`;
  if (code===orig) {
    delete pending[pKey];
  } else {
    pending[pKey]={agent,date,shift:code,orig};
  }
  const edited=pKey in pending;
  const {bg,c}=cellStyle(code);
  const lbl=shortLabel(code);
  // Update chip
  const chipId=`chip-${agent.replace(/\s+/g,'-').replace(/[^\w-]/g,'')}-${date}`;
  const chip=document.getElementById(chipId);
  if(chip){
    chip.style.background=bg; chip.style.color=c;
    chip.innerHTML=lbl+(edited?'<span class="edited-dot"></span>':'');
    chip.classList.toggle('edited',edited);
  }
  updatePending();
}

/* ── PENDING STATE ── */
function updatePending() {
  const n=Object.keys(pending).length;
  const bar=document.getElementById('save-bar');
  const badge=document.getElementById('pending-badge');
  const topBtn=document.getElementById('save-top-btn');
  const count=document.getElementById('pending-count');
  const barCount=document.getElementById('save-bar-count');

  if(barCount) barCount.textContent=`${n} unsaved change${n!==1?'s':''}`;
  if(count) count.textContent=n;
  if(badge) badge.style.display=n>0?'':'none';
  if(topBtn) topBtn.style.display=n>0?'':'none';
  if(bar) bar.classList.toggle('show',n>0);
}

function discardAll() {
  if (!Object.keys(pending).length) return;
  if (!confirm('Discard all unsaved changes?')) return;
  pending={};
  updatePending();
  renderGrid();
}

async function saveAll() {
  const changes=Object.values(pending);
  if (!changes.length) return;
  const btns=[document.getElementById('save-btn'),document.getElementById('save-top-btn')];
  btns.forEach(b=>{if(b){b.disabled=true;b.textContent='Saving…';}});
  try {
    await API.bulkUpdateShifts(changes, user.name);
    // Update local data
    changes.forEach(ch=>{
      const ag=allAgents.find(a=>(a.n||a.name)===ch.agent);
      const idx=allDates.indexOf(ch.date);
      if(ag&&idx>=0&&ag.sch) ag.sch[idx]=ch.shift;
    });
    const n=changes.length;
    pending={};
    updatePending();
    renderGrid();
    API.clearCache('getAll');
    U.toast(`✓ ${n} change${n>1?'s':''} saved to schedule`,'ok');
  } catch(e) {
    Nav.setSyncStatus(false);
    U.toast('Save failed — check n8n workflow','err');
    console.error('saveAll error:',e);
  } finally {
    btns.forEach(b=>{if(b){b.disabled=false;b.textContent=b.id==='save-btn'?'✓ Save All':'✓ Save';}});
  }
}

init();
</script>
</body>
</html>
