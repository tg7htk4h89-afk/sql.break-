<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0A2E5A">
<title>KIB WFM — Daily Mood</title>
<link rel="stylesheet" href="css/kib.css">
<style>
/* ── MOOD PAGE ── */
.mood-hero {
  background: linear-gradient(135deg, #0A2E5A 0%, #0D3A70 60%, #005A6E 100%);
  border-radius: 0 0 28px 28px;
  padding: 22px 16px 20px;
  margin-bottom: 16px;
  position: relative; overflow: hidden;
}
.mood-hero::after {
  content: '✦';
  position: absolute; bottom: 10px; right: 18px;
  font-size: 52px; color: rgba(255,255,255,.04);
  line-height: 1;
}
.mood-hero-title {
  font-size: 20px; font-weight: 800; color: #fff;
  letter-spacing: -.3px; margin-bottom: 2px;
}
.mood-hero-sub { font-size: 12px; color: rgba(255,255,255,.5); margin-bottom: 14px; }

/* Date nav */
.mood-date-nav { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.md-arrow {
  width: 30px; height: 30px;
  border: 1.5px solid rgba(255,255,255,.2);
  border-radius: 9px; background: rgba(255,255,255,.08);
  color: #fff; font-size: 15px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .12s; flex-shrink: 0;
}
.md-arrow:hover { background: rgba(255,255,255,.18); }
.md-arrow:disabled { opacity: .3; cursor: not-allowed; }
.mood-date-val { flex: 1; font-size: 13px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 6px; }
.today-badge { font-size: 9px; font-weight: 700; background: var(--teal); color: #fff; padding: 2px 7px; border-radius: 20px; }
input[type="date"].md-datepick {
  background: rgba(255,255,255,.1); border: 1.5px solid rgba(255,255,255,.2);
  border-radius: 9px; color: #fff; padding: 5px 8px; font-size: 11px; cursor: pointer; outline: none;
}
input[type="date"].md-datepick::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.6); }

/* Mood stats bar */
.mood-stats { display: flex; gap: 6px; flex-wrap: wrap; }
.mood-stat {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.12);
  border-radius: 20px; padding: 5px 12px;
  font-size: 13px; color: #fff; font-weight: 600;
  display: flex; align-items: center; gap: 5px;
}
.mood-stat-count { font-size: 11px; color: rgba(255,255,255,.6); }

/* ── EMOJI PICKER CARD ── */
.picker-card {
  background: var(--white); border-radius: 20px;
  border: 1px solid var(--border2); box-shadow: var(--shadow);
  overflow: hidden; margin-bottom: 14px;
}
.picker-card-hdr {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border2);
}
.picker-card-title { font-size: 13px; font-weight: 700; color: var(--t1); }
.picker-card-sub   { font-size: 11px; color: var(--t3); margin-top: 2px; }

.emoji-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 14px 16px;
}
.emoji-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  background: var(--bg); border: 2px solid transparent;
  border-radius: 14px; padding: 10px 4px;
  cursor: pointer; transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.emoji-btn:hover { background: rgba(10,46,90,.06); border-color: rgba(10,46,90,.15); }
.emoji-btn.selected {
  background: rgba(10,46,90,.08);
  border-color: var(--navy);
  box-shadow: 0 0 0 3px rgba(10,46,90,.1);
}
.emoji-btn .emoji-glyph { font-size: 28px; line-height: 1; }
.emoji-btn .emoji-label { font-size: 9px; font-weight: 700; color: var(--t2); text-align: center; line-height: 1.2; }
.emoji-btn.selected .emoji-label { color: var(--navy); }

.picker-footer {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border2);
  display: flex; align-items: center; gap: 10px;
}
.selected-preview {
  flex: 1; display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--t3);
}
.selected-preview .sp-emoji { font-size: 22px; }
.selected-preview .sp-label { font-size: 12px; font-weight: 600; color: var(--t1); }
.btn-submit-mood {
  padding: 10px 20px;
  background: var(--navy); color: #fff;
  border: none; border-radius: 12px;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: background .12s; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.btn-submit-mood:hover { background: var(--teal); }
.btn-submit-mood:disabled { background: var(--t3); cursor: not-allowed; }

/* ── STICKER WALL ── */
.wall-section-label {
  text-align: center; font-size: 10px; font-weight: 700;
  color: var(--t3); text-transform: uppercase; letter-spacing: .8px;
  display: flex; align-items: center; gap: 10px; margin: 14px 0 12px;
}
.wall-section-label::before, .wall-section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border2);
}

/* Sticker wall grid */
.sticker-wall {
  min-height: 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 10px;
}
.sticker {
  background: var(--white);
  border-radius: 16px;
  border: 1px solid var(--border2);
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
  padding: 14px 8px 10px;
  text-align: center;
  animation: stickerPop .3s cubic-bezier(.34,1.56,.64,1) both;
  transition: transform .15s, box-shadow .15s;
  position: relative;
}
.sticker:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.1); }
.sticker.is-me {
  border-color: var(--navy);
  background: linear-gradient(135deg, rgba(10,46,90,.04) 0%, rgba(0,168,154,.04) 100%);
}
.sticker.is-me::after {
  content: 'You';
  position: absolute; top: 6px; right: 6px;
  font-size: 8px; font-weight: 800;
  background: var(--navy); color: #fff;
  padding: 1px 5px; border-radius: 8px;
}
@keyframes stickerPop { from { opacity:0; transform:scale(.7) translateY(8px); } }

.sticker-emoji { font-size: 34px; line-height: 1; margin-bottom: 6px; display: block; }
.sticker-name  { font-size: 10px; font-weight: 700; color: var(--t1); line-height: 1.3; word-break: break-word; }
.sticker-label { font-size: 9px; color: var(--t3); margin-top: 2px; }
.sticker-time  { font-size: 9px; color: var(--t3); margin-top: 3px; }

/* Group header */
.emoji-group-hdr {
  grid-column: 1 / -1;
  font-size: 12px; font-weight: 700; color: var(--t2);
  padding: 6px 0 2px;
  display: flex; align-items: center; gap: 8px;
}
.emoji-group-hdr::after { content: ''; flex:1; height:1px; background: var(--border2); }

/* Empty / loading */
.mood-empty {
  grid-column: 1 / -1;
  text-align: center; padding: 40px 20px;
  background: var(--white); border-radius: 16px; border: 1px solid var(--border2);
}
.mood-empty-emoji { font-size: 40px; display: block; margin-bottom: 10px; }
.mood-empty h3    { font-size: 16px; font-weight: 700; margin-bottom: 5px; }
.mood-empty p     { font-size: 12px; color: var(--t3); }
</style>
</head>
<body>
<div id="kib-topbar"></div>
<div id="user-strip-wrap"></div>

<div class="page-content" style="padding-top:0; padding-bottom:90px;">

  <!-- HERO -->
  <div class="mood-hero">
    <div class="mood-hero-title">Team Mood Board ✦</div>
    <div class="mood-hero-sub">How's everyone feeling today?</div>
    <div class="mood-date-nav">
      <button class="md-arrow" id="btn-prev">‹</button>
      <div class="mood-date-val">
        <span id="mood-date-lbl">—</span>
        <span class="today-badge" id="today-badge" style="display:none;">TODAY</span>
      </div>
      <input type="date" class="md-datepick" id="mood-datepick">
      <button class="md-arrow" id="btn-next">›</button>
    </div>
    <div class="mood-stats" id="mood-stats">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- EMOJI PICKER (today only) -->
  <div class="picker-card" id="picker-card">
    <div class="picker-card-hdr">
      <div class="picker-card-title">How are you feeling today?</div>
      <div class="picker-card-sub" id="picker-sub">Pick one emoji that best describes your mood</div>
    </div>
    <div class="emoji-grid" id="emoji-grid">
      <!-- injected by JS -->
    </div>
    <div class="picker-footer">
      <div class="selected-preview" id="sel-preview">
        <span>Tap an emoji above</span>
      </div>
      <button class="btn-submit-mood" id="btn-submit" disabled>
        Share Mood
      </button>
    </div>
  </div>

  <!-- STICKER WALL -->
  <div class="wall-section-label"><span id="wall-lbl">Today's Vibes</span></div>
  <div class="sticker-wall" id="sticker-wall">
    <div class="feed-loading" style="grid-column:1/-1;padding:32px;text-align:center;">
      <div class="kib-spin" style="margin:0 auto 8px;"></div>
      <div style="font-size:12px;color:var(--t3);">Loading moods…</div>
    </div>
  </div>

</div>
<div id="kib-bottomnav"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script>
if (!Auth.guard()) throw 0;
const user = Auth.user();
Nav.init('mood');
document.getElementById('user-strip-wrap').innerHTML = Nav.renderUserStrip ? Nav.renderUserStrip() : '';

/* ── EMOJI OPTIONS ──────────────────────────────────────── */
const EMOJIS = [
  { e: '😄', label: 'Happy'       },
  { e: '🤩', label: 'Excited'     },
  { e: '😎', label: 'Confident'   },
  { e: '🙏', label: 'Grateful'    },
  { e: '💪', label: 'Motivated'   },
  { e: '😊', label: 'Good'        },
  { e: '😐', label: 'Neutral'     },
  { e: '🤔', label: 'Thinking'    },
  { e: '😴', label: 'Tired'       },
  { e: '🤯', label: 'Overwhelmed' },
  { e: '😤', label: 'Frustrated'  },
  { e: '🙁', label: 'Down'        },
  { e: '🤒', label: 'Unwell'      },
  { e: '☕', label: 'Need coffee'  },
  { e: '🚀', label: 'On fire'     },
];

/* ── STATE ─────────────────────────────────────────────── */
let selDate = U.today();
let selEmoji = null;
let moods = [];

/* ── UTILITIES ─────────────────────────────────────────── */
function addDays(iso, n) {
  const d = new Date(iso + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}
function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', day:'numeric', month:'long' });
}
function fmtTime(dt) {
  if (!dt) return '';
  try { return new Date(dt).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' }); }
  catch { return ''; }
}
function uid() {
  const n = new Date();
  return `${n.getFullYear()}${String(n.getMonth()+1).padStart(2,'0')}${String(n.getDate()).padStart(2,'0')}-${String(n.getHours()).padStart(2,'0')}${String(n.getMinutes()).padStart(2,'0')}${String(n.getSeconds()).padStart(2,'0')}-${String(Math.random()*1000|0).padStart(3,'0')}`;
}
function myUserId() { return user.user_id || user.id || ''; }
function myName()   { return user.name || user.full_name || ''; }

/* ── RENDER HEADER ─────────────────────────────────────── */
function renderHeader() {
  const isToday = selDate === U.today();
  document.getElementById('mood-date-lbl').textContent = fmtDate(selDate);
  document.getElementById('today-badge').style.display = isToday ? '' : 'none';
  document.getElementById('mood-datepick').value = selDate;
  document.getElementById('btn-next').disabled = isToday;
  document.getElementById('picker-card').style.display = isToday ? '' : 'none';
  document.getElementById('wall-lbl').textContent = isToday ? "Today's Vibes" : `Moods · ${fmtDate(selDate)}`;
}

/* ── RENDER EMOJI GRID ─────────────────────────────────── */
function renderPicker() {
  const myMood = moods.find(m => m.user_id === myUserId());
  const grid = document.getElementById('emoji-grid');

  grid.innerHTML = EMOJIS.map(({ e, label }) => {
    const isSelected = selEmoji === e || (myMood && myMood.emoji === e);
    return `<button class="emoji-btn ${isSelected ? 'selected' : ''}" onclick="pickEmoji('${e}', '${label}')">
      <span class="emoji-glyph">${e}</span>
      <span class="emoji-label">${label}</span>
    </button>`;
  }).join('');

  // If already submitted today, pre-select their current mood
  if (myMood && !selEmoji) {
    selEmoji = myMood.emoji;
    const sub = document.getElementById('picker-sub');
    sub.textContent = `You shared "${myMood.emoji_label}" today — tap a different one to update`;
    updatePreview(myMood.emoji, myMood.emoji_label);
  }
}

function pickEmoji(e, label) {
  selEmoji = e;
  // Update UI
  document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  updatePreview(e, label);
  document.getElementById('btn-submit').disabled = false;
}

function updatePreview(e, label) {
  document.getElementById('sel-preview').innerHTML =
    `<span class="sp-emoji">${e}</span><span class="sp-label">${label}</span>`;
  document.getElementById('btn-submit').disabled = false;
}

/* ── RENDER STATS BAR ──────────────────────────────────── */
function renderStats() {
  const counts = {};
  moods.forEach(m => {
    const key = m.emoji + '|' + m.emoji_label;
    counts[key] = (counts[key] || 0) + 1;
  });
  const sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]).slice(0, 5);
  document.getElementById('mood-stats').innerHTML = sorted.map(([key, n]) => {
    const [emoji] = key.split('|');
    return `<div class="mood-stat"><span>${emoji}</span><span class="mood-stat-count">${n}</span></div>`;
  }).join('') + (moods.length ? `<div class="mood-stat"><span style="font-size:10px;">👥</span><span class="mood-stat-count">${moods.length} shared</span></div>` : '');
}

/* ── RENDER STICKER WALL ────────────────────────────────── */
function renderWall() {
  const wall = document.getElementById('sticker-wall');
  if (!moods.length) {
    wall.innerHTML = `<div class="mood-empty">
      <span class="mood-empty-emoji">🌤</span>
      <h3>No moods yet</h3>
      <p>Be the first to share how you're feeling!</p>
    </div>`;
    return;
  }

  // Group by emoji
  const groups = {};
  moods.forEach(m => {
    const k = m.emoji;
    if (!groups[k]) groups[k] = [];
    groups[k].push(m);
  });

  // Sort groups by count
  const sortedGroups = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);

  let html = '';
  sortedGroups.forEach(([emoji, entries]) => {
    const label = entries[0].emoji_label;
    html += `<div class="emoji-group-hdr">${emoji} ${label} <span style="font-size:10px;color:var(--t3);font-weight:400;">(${entries.length})</span></div>`;
    entries.forEach(m => {
      const isMe = m.user_id === myUserId();
      const firstName = (m.user_name||'').split(' ')[0];
      html += `<div class="sticker ${isMe ? 'is-me' : ''}">
        <span class="sticker-emoji">${emoji}</span>
        <div class="sticker-name">${firstName}</div>
        <div class="sticker-label">${m.department||''}</div>
        <div class="sticker-time">${fmtTime(m.created_at)}</div>
      </div>`;
    });
  });

  wall.innerHTML = html;
}

/* ── LOAD ───────────────────────────────────────────────── */
async function loadMoods(date) {
  document.getElementById('sticker-wall').innerHTML =
    `<div style="grid-column:1/-1;padding:32px;text-align:center;">
      <div class="kib-spin" style="margin:0 auto 8px;"></div>
      <div style="font-size:12px;color:var(--t3);">Loading…</div>
    </div>`;
  try {
    const res = await fetch(CFG.N8N.MOOD_GET, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ date })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    moods = data.data || [];
    renderStats();
    renderPicker();
    renderWall();
  } catch(e) {
    document.getElementById('sticker-wall').innerHTML =
      `<div class="mood-empty"><span class="mood-empty-emoji">⚠️</span><h3>Couldn't load</h3><p>${e.message}</p></div>`;
    U.toast('Failed to load moods', 'err');
  }
}

/* ── SUBMIT ─────────────────────────────────────────────── */
async function submitMood() {
  if (!selEmoji) return;
  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = '⏳';

  try {
    const emojiObj = EMOJIS.find(x => x.e === selEmoji);
    const res = await fetch(CFG.N8N.MOOD_SUBMIT, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        mood_id:     'MOOD-' + uid(),
        mood_date:   selDate,
        user_id:     myUserId(),
        user_name:   myName(),
        employee_id: user.employee_id || '',
        department:  user.dept || user.department || '',
        role:        user.role || '',
        emoji:       selEmoji,
        emoji_label: emojiObj ? emojiObj.label : selEmoji,
        created_at:  new Date().toISOString(),
      })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.message);
    U.toast('Mood shared! ' + selEmoji, 'ok');
    await loadMoods(selDate);
  } catch(e) {
    U.toast('Failed: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Share Mood';
  }
}

/* ── EVENTS ─────────────────────────────────────────────── */
document.getElementById('btn-prev').addEventListener('click', () => {
  selDate = addDays(selDate, -1); selEmoji = null; renderHeader(); loadMoods(selDate);
});
document.getElementById('btn-next').addEventListener('click', () => {
  const n = addDays(selDate, 1);
  if (n <= U.today()) { selDate = n; selEmoji = null; renderHeader(); loadMoods(selDate); }
});
document.getElementById('mood-datepick').addEventListener('change', e => {
  if (e.target.value <= U.today()) { selDate = e.target.value; selEmoji = null; renderHeader(); loadMoods(selDate); }
  else { U.toast("Can't browse future dates", 'warn'); e.target.value = selDate; }
});
document.getElementById('btn-submit').addEventListener('click', submitMood);

/* ── INIT ────────────────────────────────────────────────── */
renderHeader();
loadMoods(selDate);
</script>
</body>
</html>
